services:
  postgres:
    image: postgres:16
    container_name: crawler-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler_password
      POSTGRES_DB: crawler_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d crawler_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: firstfinger/minio:1.7.3
    container_name: crawler-minio
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password

    ports:
      - "9000:9000"
      - "9001:9001"
      - "9002:9002"

    volumes:
      - minio_data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: crawler-elasticsearch
    restart: unless-stopped

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx3g

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200 >/dev/null || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 10


  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: crawler-kibana
    restart: unless-stopped

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    ports:
      - "5601:5601"

    depends_on:
      elasticsearch:
        condition: service_healthy


volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
