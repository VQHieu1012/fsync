services:
  postgres:
    image: postgres:16
    container_name: crawler-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler_password
      POSTGRES_DB: crawler_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d crawler_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: firstfinger/minio:1.7.3
    container_name: crawler-minio
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password

    ports:
      - "9000:9000"
      - "9001:9001"
      - "9002:9002"

    volumes:
      - minio_data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: crawler-elasticsearch
    restart: unless-stopped

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx3g

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200 >/dev/null || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: crawler-kibana
    restart: unless-stopped

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    ports:
      - "5601:5601"

    depends_on:
      elasticsearch:
        condition: service_healthy

  neo4j:
    image: neo4j:5.26
    container_name: crawler-neo4j
    restart: unless-stopped

    environment:
      NEO4J_AUTH: neo4j/neo4j_password

      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 1G

      NEO4J_server_memory_pagecache_size: 1G

      NEO4J_PLUGINS: '["apoc"]'

      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"

      NEO4J_dbms_security_procedures_unrestricted: apoc.*

    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:7474 || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:

  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
